name: release

# Runs automatically on every push to main (i.e. when a PR merges or a commit
# lands directly), and can also be triggered manually from the Actions tab.
# Auto-picks the next sequential release-N tag, builds Linux x86_64, Windows
# x64+x86, macOS universal, and the WebAssembly bundle, packages each into the
# user-facing archive (binary + README + LICENSE + NOTICES, NO .openbounty
# pack), publishes the hosted WASM build to danheskett.com, and creates a
# GitHub Release with the archives attached and auto-generated notes.
#
# Docs-only pushes are skipped (they don't change the binaries).
#
# Tag is created in the publish job AFTER all builds succeed, so a
# failed build leaves N unused and the next run reuses it.
# The triggering commit SHA is captured up front and used everywhere,
# so a mid-build push to main does not affect what gets tagged. Pushing the
# release-N tag does not retrigger this workflow (the trigger is branch
# pushes only).

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch: {}

permissions:
  contents: write   # create tag + publish release

concurrency:
  # Never cancel a release mid-build: artifacts won't have a tag and
  # the next run will reuse N anyway, so cancelling just wastes time.
  group: release
  cancel-in-progress: false

jobs:
  # Gate the whole release on the attribution guard. It also self-triggers on
  # the push, but wiring it in here means a violating commit can never reach
  # the tag/publish step.
  guard:
    uses: ./.github/workflows/attribution-guard.yml
    permissions:
      contents: write

  prepare:
    needs: guard
    name: compute next release number
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.next.outputs.version }}
      sha: ${{ steps.next.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: next
        name: Compute next release number
        run: |
          # Find max N across existing release-N tags; default to 0.
          last=$(git tag --list 'release-*' \
                   | sed -n 's/^release-\([1-9][0-9]*\)$/\1/p' \
                   | sort -n | tail -1)
          next=$(( ${last:-0} + 1 ))
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "sha=$GITHUB_SHA"  >> "$GITHUB_OUTPUT"
          echo "Next release: release-$next at $GITHUB_SHA"

  build-linux-windows:
    name: linux + windows builds
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux + mingw deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          # mingw side is C99 only: the two mingw C compilers + binutils, NOT
          # the `mingw-w64` metapackage (which pulls the g++ toolchain for both
          # arches x posix/win32 + perl -- 39 pkgs / 241 MB of unused C++).
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libasound2-dev \
            gcc-mingw-w64-x86-64 gcc-mingw-w64-i686 binutils-mingw-w64 \
            zip

      - name: Rebuild raylib against runner glibc (Linux)
        run: ./scripts/build_raylib_linux.sh

      - name: Run tests
        # `make test` runs the FULL greatest suite: unit, e2e, autoplay, and
        # the regression combat-formula digests + save fixtures.
        run: make test OPENBOUNTY_VERSION=${{ needs.prepare.outputs.version }}

      - name: Rebuild raylib for mingw (win64 + win32)
        run: ./scripts/build_raylib_windows.sh

      - name: Build release binaries (Linux + Windows)
        run: make release windows OPENBOUNTY_VERSION=${{ needs.prepare.outputs.version }}

      - name: Package archives
        run: make dist-linux dist-windows OPENBOUNTY_VERSION=${{ needs.prepare.outputs.version }}

      - name: Verify no .openbounty pack in release archives
        run: |
          set -e
          fail=0
          for f in dist/*.tar.gz; do
            if tar -tzf "$f" | grep -q '\.openbounty$'; then
              echo "FAIL: $f contains a .openbounty pack file"
              fail=1
            fi
          done
          for f in dist/*.zip; do
            if unzip -l "$f" | grep -q '\.openbounty$'; then
              echo "FAIL: $f contains a .openbounty pack file"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ]

      - uses: actions/upload-artifact@v7
        with:
          name: linux-windows
          path: |
            dist/*.tar.gz
            dist/*.zip

  build-mac:
    name: macOS universal build
    needs: prepare
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Rebuild raylib universal (arm64 + x86_64)
        run: ./scripts/build_raylib_mac.sh

      - name: Build universal binary
        run: make mac OPENBOUNTY_VERSION=${{ needs.prepare.outputs.version }}

      - name: Package archive
        run: make dist-mac OPENBOUNTY_VERSION=${{ needs.prepare.outputs.version }}

      - name: Verify no .openbounty pack in release archive
        run: |
          set -e
          fail=0
          for f in dist/*.zip; do
            if unzip -l "$f" | grep -q '\.openbounty$'; then
              echo "FAIL: $f contains a .openbounty pack file"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ]

      - uses: actions/upload-artifact@v7
        with:
          name: mac
          path: dist/*.zip

  build-web:
    name: web (WASM) build + hosted publish
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v16

      # The web target needs the LINUX toolchain too, which is not obvious:
      # $(OUT_WEB) depends on $(WEB_PACK), and the pack rule runs
      # `./build/debug/openbounty --pack-dir` -- the native binary is what
      # zips the pack that gets embedded in openbounty.data. So building the
      # wasm transitively builds the Linux game first. zip is for dist-web.
      - name: Install Linux build deps + zip
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libxi-dev libasound2-dev \
            zip

      - name: Rebuild raylib against runner glibc (Linux)
        run: ./scripts/build_raylib_linux.sh

      - name: Build raylib (web)
        run: ./scripts/build_raylib_web.sh

      # OPENBOUNTY_VERSION must be passed HERE, not only to dist-web: it bakes
      # build/version.h into the wasm. Packaging later with a different value
      # would just rezip a binary carrying the wrong version.
      - name: Build WASM
        run: make web OPENBOUNTY_VERSION=${{ needs.prepare.outputs.version }}

      - name: Detect site token
        id: sitesecret
        env:
          T: ${{ secrets.SITE_REBUILD_TOKEN }}
        run: |
          if [ -n "$T" ]; then
            echo "present=true"  >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "SITE_REBUILD_TOKEN not set; skipping hosted publish"
          fi

      # Four files, not three: unlike the other hosted games on the site,
      # openbounty ships an asset pack, so openbounty.data must go up too or
      # the page loads to a black screen. Only the HTML is renamed -- the
      # generated shell references openbounty.js by name, and the loader
      # fetches openbounty.data by name.
      - name: Publish the hosted build to the site (danheskett.com/dist/openbounty)
        if: steps.sitesecret.outputs.present == 'true'
        env:
          TOKEN: ${{ secrets.SITE_REBUILD_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          rm -rf site-repo
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/dannyheskett/danheskett.git" site-repo
          dst=site-repo/static/dist/openbounty
          mkdir -p "$dst"
          cp build/web/openbounty.html "$dst/index.html"
          cp build/web/openbounty.js   "$dst/openbounty.js"
          cp build/web/openbounty.wasm "$dst/openbounty.wasm"
          cp build/web/openbounty.data "$dst/openbounty.data"
          cd site-repo
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/dist/openbounty
          if git diff --cached --quiet; then
            echo "hosted WASM unchanged"
          else
            git commit -m "openbounty: update hosted WASM to release-${VERSION}"
            git push
          fi

      - name: Package WASM bundle
        run: make dist-web OPENBOUNTY_VERSION=${{ needs.prepare.outputs.version }}

      # Same belt-and-braces check the desktop jobs run. It passes by design:
      # the pack rides inside openbounty.data, which is the intended embedding
      # -- what must never ship is a loose *.openbounty file.
      - name: Verify no .openbounty pack in release archive
        run: |
          set -e
          fail=0
          for f in dist/*.zip; do
            if unzip -l "$f" | grep -q '\.openbounty$'; then
              echo "FAIL: $f contains a .openbounty pack file"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ]

      - uses: actions/upload-artifact@v7
        with:
          name: web
          path: dist/*.zip

  publish:
    name: tag + publish GitHub Release
    needs: [prepare, build-linux-windows, build-mac, build-web]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist-merged
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist-merged/

      - name: Create release-N tag at the dispatched commit
        env:
          V: ${{ needs.prepare.outputs.version }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "release-$V" "$SHA"
          git push origin "release-$V"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ needs.prepare.outputs.version }}
          name: release-${{ needs.prepare.outputs.version }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          files: dist-merged/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false

      # Rebuild danheskett.com AFTER the release-N tag exists. The project page
      # renders its releases via a Hugo shortcode that fetches releases/latest
      # at build time; the WASM push in build-web rebuilds the site too early
      # (before this tag), so without this the page lags one release behind.
      - name: Trigger site rebuild
        env:
          TOKEN: ${{ secrets.SITE_REBUILD_TOKEN }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/dannyheskett/danheskett/actions/workflows/hugo.yml/dispatches \
            -d '{"ref":"main"}'
